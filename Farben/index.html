<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farben</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="topbar" aria-labelledby="app-title">
      <div>
        <p class="eyebrow">Jakob-Muth-Schule Nürnberg</p>
        <h1 id="app-title">Farben</h1>
        <p class="intro">Schön, dass du hier bist. Übe Grundfarben, höre Farbnamen und entdecke ähnliche Farbtöne.</p>
      </div>

      <div class="voice-panel" aria-label="Sprachausgabe">
        <button class="secondary-button" id="voice-test" type="button">Stimme testen</button>
        <label class="voice-toggle">
          <input id="auto-speak" type="checkbox" checked>
          <span>Automatisch sprechen</span>
        </label>
      </div>
    </section>

    <nav class="mode-tabs" aria-label="Lernmodus auswählen">
      <button class="tab" type="button" data-mode="learn">Lernen</button>
      <button class="tab" type="button" data-mode="find">Farbe finden</button>
      <button class="tab" type="button" data-mode="listen">Hören</button>
      <button class="tab" type="button" data-mode="sequence">Reihenfolge</button>
      <button class="tab active" type="button" data-mode="object">Welche Farbe hat?</button>
    </nav>

    <section class="status-band" aria-live="polite">
      <div>
        <p class="status-label">Aktuelle Aufgabe</p>
        <p class="task-text" id="task-text">Tippe eine Farbe an, um den Namen zu hören.</p>
      </div>
      <div class="score-box">
        <span id="score">0</span>
        <small>Punkte</small>
      </div>
    </section>

    <section class="controls" aria-label="Training steuern">
      <button class="primary-button" id="repeat" type="button">Nochmal hören</button>
      <button class="secondary-button" id="next" type="button">Neue Aufgabe</button>
      <select id="level-filter" aria-label="Schwierigkeit auswählen">
        <option value="basic">Grundfarben</option>
        <option value="more">Mehr Farben</option>
        <option value="shades">Farbtöne</option>
        <option value="all">Alle Farben</option>
      </select>
    </section>

    <section class="activity-panel" id="activity-panel" aria-label="Lernbereich"></section>
    <section class="feedback" id="feedback" aria-live="assertive">Bereit.</section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
